<script>
  try {
    const savedTheme = localStorage.getItem('field-notes-theme');
    if (savedTheme === 'light') {
      document.documentElement.dataset.theme = 'light';
    } else if (savedTheme === 'dark') {
      document.documentElement.dataset.theme = 'dark';
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.dataset.theme = 'light';
    } else {
      document.documentElement.dataset.theme = 'dark';
    }
  } catch {}
</script>
  <link rel="stylesheet" href="../style.css">
</head>
<body data-page="collection" data-collection="portraits">

<header>
  <div class="site-brand">
    <a class="site-name" href="../">
      <span>photographic</span>
      <span>reflexes</span>
    </a>
    <nav class="site-nav" aria-label="Sections">
      <a class="site-nav-link" href="../">journal</a>
      <a class="site-nav-link is-active" href="../portraits/">portraits</a>
      <a class="site-nav-link" href="../japan-2023/">japan 2023</a>
    </nav>
  </div>
  <div class="header-tools">
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to light theme">light</button>
    <span class="header-meta" data-loading-label="Loading portraits"></span>
  </div>
</header>

<div id="journal"></div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="lightbox-close" id="lb-close">close ✕</button>
    <div id="lb-img-wrap"></div>
    <div class="lightbox-meta">
      <div class="lightbox-meta-header">
        <span class="lightbox-date" id="lb-meta"></span>
        <button
          class="lightbox-info-toggle"
          id="lb-info-toggle"
          type="button"
          aria-controls="lb-exif"
          aria-expanded="false"
          hidden
        >
          info
        </button>
      </div>
      <dl class="lightbox-exif" id="lb-exif" hidden></dl>
    </div>
  </div>
</div>

<script type="module" src="../js/app.js"></script>
</body>
</html>
